<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petualangan Baca Arka</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#38bdf8">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; --success: #4ade80; --danger: #f87171; --accent: #fbbf24; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html { background-color: var(--bg); }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100dvh; overflow-y: auto; padding: 20px 0; }
    
    .container { background: var(--card); width: 90%; max-width: 500px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); text-align: center; position: relative; margin: auto; border: 2px solid rgba(255,255,255,0.05); }
    
    .hidden { display: none !important; }
    h2 { color: var(--primary); font-size: 1.6rem; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }

    /* Star Badge */
    .star-badge { background: rgba(251, 191, 36, 0.1); border: 2px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 50px; display: inline-flex; align-items: center; gap: 8px; font-weight: 900; font-size: 1.2rem; margin-bottom: 20px; }

    .form-group { margin-bottom: 15px; text-align: left; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; color: #94a3b8; font-size: 0.85rem; }
    select, input[type="number"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #fff; font-size: 1rem; }
    
    button.btn-main { width: 100%; background: var(--primary); color: #0f172a; border: none; padding: 18px; border-radius: 15px; font-size: 1.2rem; cursor: pointer; font-weight: 900; margin-top: 10px; box-shadow: 0 4px 0 #0284c7; transition: 0.1s; letter-spacing: 1px; }
    button.btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #0284c7; }

    /* RACING TRACK UI */
    .track-container { width: 100%; background: #0f172a; height: 50px; border-radius: 10px; margin: 20px 0; position: relative; border: 2px dashed #334155; overflow: hidden; display: flex; align-items: center; }
    #car-avatar { position: absolute; font-size: 2rem; left: 0%; transition: left 1s linear; z-index: 2; }
    .finish-line { position: absolute; right: 5px; font-size: 1.5rem; z-index: 1; opacity: 0.5; }

    #target-text { font-size: 1.8rem; line-height: 1.4; font-weight: 700; margin: 15px 0; padding: 20px; background: #0f172a; border-radius: 20px; border: 2px solid #334155; text-align: left; }
    
    .mic-status { margin-top: 15px; }
    .mic-icon { font-size: 2.5rem; background: var(--danger); width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; border-radius: 50%; animation: pulse 1.5s infinite; margin: 0 auto 10px auto; }
    @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(248, 113, 113, 0); } 100% { transform: scale(0.95); } }
    
    #live-transcript { font-size: 0.9rem; color: var(--success); font-style: italic; opacity: 0.7; }

    .recap-box { background: #0f172a; padding: 20px; border-radius: 15px; text-align: left; margin-bottom: 20px; font-size: 1.3rem; line-height: 1.6; }
    .word-correct { color: var(--success); font-weight: bold; border-bottom: 3px solid var(--success); }
    .word-wrong { color: var(--danger); text-decoration: line-through; opacity: 0.5; }
  </style>
</head>
<body>

  <div id="screen-menu" class="container">
    <div class="star-badge">⭐ <span id="total-stars">0</span> Bintang Arka</div>
    <h2>🚀 Petualangan Arka</h2>
    
    <div class="form-group">
      <label>Pilih Misi Membaca</label>
      <select id="set-level">
        <option value="arka">Dunia Arka (Spesial) 🏠</option>
        <option value="mudah">Misi Kilat (Mudah) ⚡</option>
        <option value="sedang">Misi Seru (Sedang) 🌟</option>
        <option value="sulit">Misi Master (Sulit) 🏆</option>
      </select>
    </div>

    <div class="form-group">
      <label>Batas Waktu (Balapan)</label>
      <select id="set-waktu">
        <option value="15">Sangat Cepat (15 Detik)</option>
        <option value="30" selected>Sedang (30 Detik)</option>
        <option value="60">Santai (60 Detik)</option>
      </select>
    </div>

    <button class="btn-main" onclick="mintaAksesMic()">MULAI BALAPAN BACA!</button>
  </div>

  <div id="screen-game" class="container hidden">
    <div class="header-game">
      <span style="font-weight: 900; color: #94a3b8;" id="label-soal">MISI ARKA</span>
      <span id="timer-text" style="font-weight: 900; font-size: 1.5rem; color: var(--accent);">30</span>
    </div>

    <div class="track-container">
      <div id="car-avatar">🏎️</div>
      <div class="finish-line">🏁</div>
    </div>

    <div id="target-text">Bersiap...</div>

    <div class="mic-status">
      <div class="mic-icon">🎤</div>
      <div id="live-transcript">Mendengarkan...</div>
    </div>
    
    <button class="btn-main" style="background: var(--success); margin-top: 20px;" onclick="selesaiBaca()">SELESAI MANTAP!</button>
  </div>

  <div id="screen-recap" class="container hidden">
    <h2 id="recap-title">HEBAT!</h2>
    <h1 id="final-score" style="margin:10px 0; font-size: 4.5rem; color: var(--success);">100</h1>
    <div id="star-reward" style="font-size: 2.5rem; margin-bottom: 15px;">⭐⭐⭐</div>
    
    <div class="recap-box" id="koreksi-hasil"></div>

    <button class="btn-main" onclick="mainLagi()">MAIN LAGI</button>
  </div>

  <script>
    // --- DATABASE CERITA (TERMASUK DUNIA ARKA) ---
    const dbCerita = {
      arka: [
        "Nama aku Arka. Aku tinggal di Jayapura yang indah. Aku punya Ayah Ardian dan Ibu Kartika yang sayang padaku.",
        "Arka suka sekali makan burger. Kami sering mampir ke Lazatto untuk beli ayam goreng yang sangat krispi.",
        "Ayah Ardian mengajak Arka jalan-jalan sore hari. Kami naik mobil keliling kota dan melihat pemandangan yang bagus.",
        "Ibu Kartika masak nasi goreng yang enak sekali. Arka makan dengan lahap sampai perut terasa kenyang dan senang.",
        "Arka adalah anak yang pintar dan berani. Arka rajin belajar membaca agar bisa jadi juara satu di sekolah nanti."
      ],
      mudah: [ "Kucing tidur di kursi.", "Ibu masak nasi.", "Bola Arka warna biru.", "Burung terbang tinggi.", "Ikan berenang di kolam.", "Matahari terbit pagi hari.", "Buku Arka sangat baru.", "Gigi bersih dan putih." ],
      sedang: [ "Kelinci suka makan wortel di kebun belakang rumah yang hijau.", "Hujan turun sangat deras pagi ini sehingga jalanan menjadi basah.", "Ayah sedang membaca koran sambil minum kopi hangat di teras.", "Sepeda baru Arka sangat cepat saat dikayuh di jalanan yang lurus." ],
      sulit: [ "Pada hari Minggu yang cerah, Arka dan keluarga pergi berlibur ke pantai. Pasir pantainya sangat putih dan lembut di kaki. Kami bermain ombak sampai sore.", "Kucing kesayangan Arka bernama si Manis. Bulunya berwarna belang tiga dan sangat halus. Setiap lapar, si Manis akan mengeong keras meminta ikan segar." ]
    };

    let waktu, maxWaktu, timerInterval, targetTeksLengkap, teksArka, isPlaying = false;
    let stars = parseInt(localStorage.getItem('arka_stars')) || 0;
    document.getElementById('total-stars').innerText = stars;

    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (window.SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'id-ID'; 
      recognition.continuous = true; 
      recognition.interimResults = true; 
    }

    function mintaAksesMic() {
      if (!recognition) { alert("Browser tidak support mic."); return; }
      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        stream.getTracks().forEach(track => track.stop());
        mulaiGame();
      }).catch(() => alert("Izin mic ditolak!"));
    }

    function mulaiGame() {
      const level = document.getElementById('set-level').value;
      targetTeksLengkap = dbCerita[level][Math.floor(Math.random() * dbCerita[level].length)];
      maxWaktu = parseInt(document.getElementById('set-waktu').value);
      waktu = maxWaktu;
      teksArka = ""; isPlaying = true;

      document.getElementById('screen-menu').classList.add('hidden');
      document.getElementById('screen-game').classList.remove('hidden');
      document.getElementById('target-text').innerText = targetTeksLengkap;
      
      updateRacingTrack();
      try { recognition.start(); } catch (e) {}

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        waktu--;
        updateRacingTrack();
        if (waktu <= 0) selesaiBaca();
      }, 1000);

      recognition.onresult = function(event) {
        let interim = ''; let final = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) final += event.results[i][0].transcript + ' ';
          else interim += event.results[i][0].transcript;
        }
        teksArka += final;
        document.getElementById('live-transcript').innerText = interim || "...";
        cekAutoSelesai(teksArka + interim);
      };
      
      recognition.onend = () => { if(isPlaying && waktu > 0) setTimeout(()=> { try{recognition.start()}catch(e){} }, 500); };
    }

    function updateRacingTrack() {
      document.getElementById('timer-text').innerText = waktu;
      // Mobil bergerak dari 0% ke 85% berdasarkan sisa waktu
      let progress = ((maxWaktu - waktu) / maxWaktu) * 85;
      document.getElementById('car-avatar').style.left = progress + "%";
    }

    function cekAutoSelesai(teks) {
      let targetClean = targetTeksLengkap.toLowerCase().replace(/[.,!?]/g, '').split(' ').filter(w => w.trim() !== '');
      let terbaca = targetClean.every(kata => teks.toLowerCase().includes(kata));
      if (terbaca && isPlaying) setTimeout(selesaiBaca, 500);
    }

    function selesaiBaca() {
      isPlaying = false; clearInterval(timerInterval);
      if (recognition) { recognition.onend = null; recognition.stop(); }
      document.getElementById('screen-game').classList.add('hidden');
      document.getElementById('screen-recap').classList.remove('hidden');
      koreksiHasil();
    }

    function koreksiHasil() {
      let targetArr = targetTeksLengkap.toLowerCase().replace(/[.,!?]/g, '').split(' ');
      let suara = teksArka.toLowerCase();
      let benar = 0; let html = "";

      targetArr.forEach(kata => {
        if (!kata.trim()) return;
        if (suara.includes(kata)) { html += `<span class="word-correct">${kata}</span> `; benar++; suara = suara.replace(kata, ''); }
        else { html += `<span class="word-wrong">${kata}</span> `; }
      });

      let persen = Math.round((benar / targetArr.length) * 100);
      document.getElementById('final-score').innerText = persen;
      document.getElementById('koreksi-hasil').innerHTML = html;

      // REWARD SYSTEM
      const starEl = document.getElementById('star-reward');
      if (persen >= 90) {
        starEl.innerText = "⭐⭐⭐";
        stars += 3; confettiEffect();
      } else if (persen >= 70) {
        starEl.innerText = "⭐⭐";
        stars += 2;
      } else if (persen >= 40) {
        starEl.innerText = "⭐";
        stars += 1;
      } else {
        starEl.innerText = "❌";
      }
      
      localStorage.setItem('arka_stars', stars);
      document.getElementById('total-stars').innerText = stars;
    }

    function confettiEffect() {
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#38bdf8', '#4ade80', '#fbbf24'] });
    }

    function mainLagi() {
      document.getElementById('screen-recap').classList.add('hidden');
      document.getElementById('screen-menu').classList.remove('hidden');
    }

    function mainLagi() { document.getElementById('screen-recap').classList.add('hidden'); document.getElementById('screen-menu').classList.remove('hidden'); }
  </script>
  <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
</body>
</html>
